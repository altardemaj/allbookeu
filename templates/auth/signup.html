{% extends "base.html" %}
{% block title %}Create Account — AllBookEU{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <a href="{{ url_for('index') }}" class="auth-logo">AllBookEU</a>
        <h1 class="auth-title">Create your account</h1>
        <p class="auth-sub">Book tables at the best restaurants in Kosovo &amp; Albania.</p>

        <form method="post" action="{{ url_for('auth.signup') }}" class="auth-form">
            <div class="auth-row">
                <div class="auth-field">
                    <label>Full name *</label>
                    <input type="text" name="name" placeholder="Your name" required autocomplete="name" class="rw-input">
                </div>
                <div class="auth-field">
                    <label>Phone number</label>
                    <input type="tel" name="phone" placeholder="+383 44 000 000" autocomplete="tel" class="rw-input">
                </div>
            </div>
            <div class="auth-field">
                <label>Email address *</label>
                <input type="email" name="email" placeholder="you@example.com" required autocomplete="email" class="rw-input">
            </div>
            <div class="auth-row">
                <div class="auth-field">
                    <label>Password *</label>
                    <input type="password" name="password" placeholder="Min. 6 characters" required minlength="6" class="rw-input">
                </div>
                <div class="auth-field">
                    <label>Confirm password *</label>
                    <input type="password" name="confirm_password" placeholder="Repeat password" required class="rw-input">
                </div>
            </div>
            <button type="submit" class="btn-reserve" style="width:100%;margin-top:8px">Create Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
        </div>
        <div class="auth-footer" style="margin-top:8px">
            Own a restaurant? <a href="{{ url_for('auth.biz_signup') }}">List it on AllBookEU →</a>
        </div>
    </div>
</div>
{% endblock %}

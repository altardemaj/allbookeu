{% extends "base.html" %}
{% block title %}Sign In — AllBookEU{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <a href="{{ url_for('index') }}" class="auth-logo">AllBookEU</a>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-sub">Sign in to your account</p>

        <div class="auth-tabs">
            <button class="auth-tab {% if tab != 'owner' %}auth-tab-active{% endif %}" onclick="switchTab('customer')">Guest</button>
            <button class="auth-tab {% if tab == 'owner' %}auth-tab-active{% endif %}" onclick="switchTab('owner')">Restaurant Owner</button>
        </div>

        <form method="post" action="{{ url_for('auth.login') }}"
              id="formCustomer" class="auth-form {% if tab == 'owner' %}hidden{% endif %}">
            <input type="hidden" name="account_type" value="customer">
            <div class="auth-field">
                <label>Email address</label>
                <input type="email" name="email" placeholder="you@example.com" required autocomplete="email" class="rw-input">
            </div>
            <div class="auth-field">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required class="rw-input">
            </div>
            <button type="submit" class="btn-reserve" style="width:100%;margin-top:8px">Sign In</button>
        </form>

        <form method="post" action="{{ url_for('auth.login') }}?tab=owner"
              id="formOwner" class="auth-form {% if tab != 'owner' %}hidden{% endif %}">
            <input type="hidden" name="account_type" value="owner">
            <div class="auth-field">
                <label>Business email</label>
                <input type="email" name="email" placeholder="owner@restaurant.com" required autocomplete="email" class="rw-input">
            </div>
            <div class="auth-field">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required class="rw-input">
            </div>
            <button type="submit" class="btn-reserve" style="width:100%;margin-top:8px">Sign In to Dashboard</button>
        </form>

        <div class="auth-footer">
            <span id="customerSignupLink" class="{% if tab == 'owner' %}hidden{% endif %}">
                No account? <a href="{{ url_for('auth.signup') }}">Sign up free</a>
            </span>
            <span id="ownerSignupLink" class="{% if tab != 'owner' %}hidden{% endif %}">
                New restaurant? <a href="{{ url_for('auth.biz_signup') }}">List your business</a>
            </span>
        </div>
    </div>
</div>
<script>
function switchTab(type) {
    document.querySelectorAll('.auth-tab')[0].classList.toggle('auth-tab-active', type === 'customer');
    document.querySelectorAll('.auth-tab')[1].classList.toggle('auth-tab-active', type === 'owner');
    document.getElementById('formCustomer').classList.toggle('hidden', type === 'owner');
    document.getElementById('formOwner').classList.toggle('hidden', type !== 'owner');
    document.getElementById('customerSignupLink').classList.toggle('hidden', type === 'owner');
    document.getElementById('ownerSignupLink').classList.toggle('hidden', type !== 'owner');
}
</script>
{% endblock %}

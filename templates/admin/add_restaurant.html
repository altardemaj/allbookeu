{% extends "admin/base.html" %}
{% block title %}Add Restaurant{% endblock %}
{% block topbar %}
<div class="admin-topbar">
  <div><h1>Add Restaurant</h1><p>Create a new restaurant listing manually</p></div>
  <a href="{{ url_for('admin.restaurants') }}" style="font-size:0.85rem;color:#6b7280">← Back to Restaurants</a>
</div>
{% endblock %}
{% block content %}
<div class="admin-card" style="max-width:760px">
  <div class="admin-card-header"><span class="admin-card-title">Restaurant Details</span></div>
  <div class="admin-card-body" style="padding:24px">
    <form method="post">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div style="grid-column:1/-1">
          <label class="form-label">Restaurant Name *</label>
          <input type="text" name="name" required class="form-input" placeholder="e.g. Soma Book Station">
        </div>
        <div>
          <label class="form-label">Cuisine</label>
          <select name="cuisine" class="form-input">
            <option value="">— Select cuisine —</option>
            {% for c in cuisines %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
          </select>
        </div>
        <div>
          <label class="form-label">Price Range</label>
          <select name="price_range" class="form-input">
            {% for pr in ['€', '€€', '€€€', '€€€€'] %}<option value="{{ pr }}">{{ pr }}</option>{% endfor %}
          </select>
        </div>
        <div>
          <label class="form-label">City *</label>
          <select name="city" class="form-input" required>
            <option value="">— Select city —</option>
            <optgroup label="Kosovo">
              {% for c in kosovo_cities %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
            </optgroup>
            <optgroup label="Albania">
              {% for c in albania_cities %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
            </optgroup>
          </select>
        </div>
        <div>
          <label class="form-label">Country</label>
          <select name="country" class="form-input">
            <option value="Kosovo">Kosovo</option>
            <option value="Albania">Albania</option>
          </select>
        </div>
        <div style="grid-column:1/-1">
          <label class="form-label">Street Address</label>
          <input type="text" name="address" class="form-input" placeholder="e.g. Rr. Sejdi Kryeziu 9">
        </div>
        <div>
          <label class="form-label">Phone</label>
          <input type="tel" name="phone" class="form-input" placeholder="+383 44 …">
        </div>
        <div>
          <label class="form-label">Business Email</label>
          <input type="email" name="biz_email" class="form-input" placeholder="info@restaurant.com">
        </div>
        <div style="grid-column:1/-1">
          <label class="form-label">Cover Photo URL</label>
          <input type="url" name="image_url" class="form-input" placeholder="https://images.unsplash.com/…">
        </div>
        <div style="grid-column:1/-1">
          <label class="form-label">Description</label>
          <textarea name="description" class="form-input" rows="3" placeholder="Short description of the restaurant…"></textarea>
        </div>
        <div style="grid-column:1/-1;display:flex;align-items:center;gap:8px">
          <input type="checkbox" name="is_featured" id="featured" style="width:16px;height:16px">
          <label for="featured" style="font-size:0.875rem;font-weight:500;cursor:pointer">Feature this restaurant on the homepage</label>
        </div>
      </div>
      <div style="margin-top:24px;display:flex;gap:12px">
        <button type="submit" class="btn-add">Add Restaurant</button>
        <a href="{{ url_for('admin.restaurants') }}" class="btn-sm btn-primary" style="padding:8px 16px;font-size:0.8rem">Cancel</a>
      </div>
    </form>
  </div>
</div>

<style>
.form-label { display:block; font-size:0.78rem; font-weight:700; color:#374151; margin-bottom:5px; text-transform:uppercase; letter-spacing:.04em; }
.form-input { width:100%; padding:9px 12px; border:1px solid #e5e7eb; border-radius:6px; font-size:0.875rem; font-family:inherit; outline:none; background:#fff; }
.form-input:focus { border-color:#e63946; }
textarea.form-input { resize:vertical; }
</style>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="csrf-token" content="{{ csrf_token() }}">
<title>Admin Login — AllBookEU</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#111827;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-card{background:#fff;border-radius:12px;padding:40px;width:100%;max-width:380px;box-shadow:0 20px 60px #00000040}
.login-logo{font-size:1.3rem;font-weight:800;color:#111;margin-bottom:4px}
.login-logo em{color:#e63946;font-style:normal}
.login-sub{font-size:0.75rem;color:#9ca3af;letter-spacing:.08em;text-transform:uppercase;margin-bottom:28px}
.field{margin-bottom:14px}
.field label{display:block;font-size:0.72rem;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.field input{width:100%;border:1px solid #e5e7eb;border-radius:6px;padding:10px 12px;font-size:0.9375rem;font-family:inherit;outline:none}
.field input:focus{border-color:#e63946}
.btn-login{width:100%;background:#111827;color:#fff;border:none;border-radius:6px;padding:12px;font-size:0.9375rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:6px}
.btn-login:hover{background:#374151}
.error{background:#fee2e2;border-radius:6px;padding:10px 14px;font-size:0.875rem;color:#991b1b;margin-bottom:16px}
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">All<em>Book</em>EU</div>
  <div class="login-sub">Admin Panel</div>
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
  <div class="error">{{ msg }}</div>
  {% endfor %}
  {% endwith %}
  <form method="post">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
    <div class="field">
      <label>Email</label>
      <input type="email" name="email" required autofocus placeholder="admin@allbookeu.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" required placeholder="••••••••">
    </div>
    <button type="submit" class="btn-login">Sign in</button>
  </form>
</div>
</body>
</html>
